<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8"/>
    <title>Circle</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <header-js></header-js>
    <main class="mainContact">
      <h1>Contact Us</h1>
      <form class="contact-form" action="submit" id="contactForm">

        <div class="inputFull">
          <label for="name">Full Name*</label>
          <input type="text" name="name" id="name" required>
          <span class="errorAlert" id="nameError"></span>
        </div>

        <div>
          <label for="email">Email</label>
          <input type="email" name="email" id="email" class="inputHalf">
          <span class="errorAlert" id="emailError"></span>
        </div>

        <div>
          <label for="phone">Phone</label>
          <input type="tel" name="phone" id="phone" class="inputHalf">
        </div>

        <div class="inputFull">
          <label for="message">Message*</label>
          <textarea type="text" name="message" id="message" class="inputFull" maxlength="350" placeholder="350 characters maximun" required></textarea>
        </div>

        <button type="submit" class="inputFull formButton">Submit</button>
       </form>

       <div id="submitStatus"></div>
    </main>
    <footer-js></footer-js>

    <script src="./js/main.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/darkmode.js"></script>
    <script src="./js/form.js"></script>
  </body>
</html>
